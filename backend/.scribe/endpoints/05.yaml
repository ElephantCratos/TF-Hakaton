name: 'Цены курсов'
description: |-

  Управление историей цен курсов: получение списка и установка новой цены.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/course_price/{id}/list'
    metadata:
      custom: []
      groupName: 'Цены курсов'
      groupDescription: |-

        Управление историей цен курсов: получение списка и установка новой цены.
      subgroup: ''
      subgroupDescription: ''
      title: 'Список цен курса'
      description: 'Возвращает историю цен указанного курса, отсортированную по дате начала действия (сначала новые).'
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      id:
        custom: []
        name: id
        description: 'Идентификатор курса.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      id: 1
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "data": {
              "course_price": [
                {
                  "id": 2,
                  "course_id": 1,
                  "price": "5000.00",
                  "valid_from": "2026-04-01",
                  "valid_to": null
                },
                {
                  "id": 1,
                  "course_id": 1,
                  "price": "4500.00",
                  "valid_from": "2026-01-01",
                  "valid_to": "2026-03-31"
                }
              ]
            }
          }
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: 'api/course_price/{id}/create'
    metadata:
      custom: []
      groupName: 'Цены курсов'
      groupDescription: |-

        Управление историей цен курсов: получение списка и установка новой цены.
      subgroup: ''
      subgroupDescription: ''
      title: 'Установить новую цену курса'
      description: |-
        Создаёт новую запись цены для указанного курса с текущей датой начала действия.
        Предыдущая активная цена (valid_to = null) автоматически закрывается (valid_to = вчера).
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      id:
        custom: []
        name: id
        description: 'Идентификатор курса.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      id: 1
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      price:
        custom: []
        name: price
        description: 'Новая стоимость курса (два знака после запятой).'
        required: true
        example: '5000.00'
        type: numeric
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      price: '5000.00'
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: |-
          {
            "message": "Установлена новая цена курса",
            "data": {
              "course_price": {
                "id": 3,
                "course_id": 1,
                "price": "5000.00",
                "valid_from": "2026-04-05",
                "valid_to": null
              }
            }
          }
        headers: []
        description: ''
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The given data was invalid.",
            "errors": {
              "price": ["validation.required"]
            }
          }
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
