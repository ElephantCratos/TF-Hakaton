      password: secret123
      password_confirmation: secret123
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: |-
          {
            "success": true,
            "message": "Регистрация прошла успешно",
            "data": {
              "user": {
                "id": 1,
                "name": "Иван Иванов",
                "email": "ivan@example.com",
                "role": "hr"
              },
              "token": "1|abc123..."
